[build]
builder = "nixpacks"

[deploy]
# Cron: 10:07 AM ET (UTC-4 in summer) = 14:07 UTC, weekdays only
cronSchedule = "7 14 * * 1-5"
startCommand = "python main.py"
restartPolicyType = "never"

# NOTE: Volumes CANNOT be defined in railway.toml — Railway ignores this.
# Create the volume manually in the dashboard:
#   service -> + Volume -> mount path: /data
# Then set env var STATE_FILE_PATH=/data/state.json so the session token
# and state persist to the volume between cron runs.
